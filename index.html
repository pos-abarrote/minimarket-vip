<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Club VIP - MiniMKT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --azul:#1A3A5C; --verde:#2D9E5F; --amarillo:#F7B731; --rojo:#D62828; --gris:#7A7A7A; }
        body { font-family:'IBM Plex Sans', sans-serif; background:#F4F1EC; min-height:100vh; display:flex; flex-direction:column; }
        
        /* Estilos de Interfaz */
        .header { background:var(--azul); padding:20px; text-align:center; border-bottom:4px solid var(--amarillo); }
        .header .logo { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--amarillo); letter-spacing:3px; }
        .header .logo span { color:white; }
        .hero { background:linear-gradient(135deg,var(--azul),#2D6A9F); color:white; padding:28px 20px; text-align:center; }
        .hero h1 { font-family:'Bebas Neue',sans-serif; font-size:42px; margin-bottom:8px; }
        .hero h1 span { color:var(--amarillo); }
        
        .container { flex:1; padding:24px 20px; max-width:480px; margin:0 auto; width:100%; }
        .card { background:white; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,.08); margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:12px; font-weight:700; color:var(--gris); text-transform:uppercase; margin-bottom:5px; }
        .form-group input { width:100%; padding:13px 16px; border:2px solid #e8e4de; border-radius:10px; font-size:16px; }
        
        .btn-registrar { width:100%; padding:16px; background:var(--verde); color:white; border:none; border-radius:12px; font-size:17px; font-weight:700; cursor:pointer; }
        
        /* Pantallas */
        .pantalla { display:none; }
        .activa { display:block; }
        
        /* Loading Spinner */
        .loading { text-align:center; padding:40px; color:var(--gris); }
        .spinner { width:40px; height:40px; border:4px solid #e8e4de; border-top-color:var(--azul); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .codigo-vip { background:var(--azul); color:white; border-radius:12px; padding:16px; margin:16px 0; text-align:center; }
        .codigo-vip .codigo { font-size:28px; font-weight:700; color:var(--amarillo); letter-spacing:4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">MINI<span>MKT</span></div>
</div>

<div class="hero">
    <h1>REGÍSTRATE Y <span>AHORRA</span></h1>
    <p>Únete al club VIP y obtén un 10% de descuento</p>
</div>

<div class="container">
    <div id="pantalla-loading" class="pantalla activa">
        <div class="loading">
            <div class="spinner"></div>
            <p>Conectando con el sistema...</p>
        </div>
    </div>

    <div id="pantalla-form" class="pantalla">
        <div class="card">
            <h2>¡Únete gratis!</h2>
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="inp-nombre" placeholder="Ej: María González">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" id="inp-wsp" placeholder="9 1234 5678">
            </div>
            <div id="form-error" style="color:var(--rojo); font-size:13px; margin-bottom:10px; display:none;"></div>
            <button class="btn-registrar" onclick="registrarCliente()">OBTENER MI 10%</button>
        </div>
    </div>

    <div id="pantalla-exito" class="pantalla">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--verde)">🎉 ¡YA ERES VIP!</h2>
            <p>Muestra este código en caja para tu descuento:</p>
            <div class="codigo-vip">
                <div class="codigo" id="codigo-display">VIP0000</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--gris); text-decoration:underline; cursor:pointer;">Volver</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURACIÓN ---
const firebaseConfig = {
    apiKey: "AIzaSyDyxfsQwQcpyHf7VgISfDGrrAKU3CizEUI",
    authDomain: "minimarket-pos-b9920.firebaseapp.com",
    databaseURL: "https://minimarket-pos-b9920-default-rtdb.firebaseio.com",
    projectId: "minimarket-pos-b9920",
    storageBucket: "minimarket-pos-b9920.appspot.com",
    messagingSenderId: "545908921698",
    appId: "1:545908921698:web:fd7e4650dbacf16f67883b"
};

var db = null;

// --- MOTOR DE ARRANQUE ---
function iniciarApp() {
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        
        // Verificar si ya está registrado en este navegador
        const telLocal = localStorage.getItem('vip_tel');
        if (telLocal) {
            buscarYMostrar(telLocal);
        } else {
            cambiarPantalla('pantalla-form');
        }
    } catch (error) {
        console.error("Error al iniciar:", error);
        document.getElementById('pantalla-loading').innerHTML = "❌ Error de conexión. Reintenta.";
    }
}

function cambiarPantalla(id) {
    document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
    document.getElementById(id).classList.add('activa');
}

// --- LÓGICA DE NEGOCIO ---
function registrarCliente() {
    const nombre = document.getElementById('inp-nombre').value.trim();
    const wsp = document.getElementById('inp-wsp').value.trim().replace(/\D/g,'');
    const errEl = document.getElementById('form-error');

    if (!nombre || wsp.length < 8) {
        errEl.innerText = "⚠ Ingresa datos válidos";
        errEl.style.display = 'block';
        return;
    }

    // Evitar duplicados
    db.ref('clientesVIP').orderByChild('whatsapp').equalTo(wsp).once('value', snapshot => {
        if (snapshot.exists()) {
            const data = snapshot.val();
            const cliente = data[Object.keys(data)[0]];
            finalizarRegistro(cliente.codigo, wsp);
        } else {
            const nuevoId = Date.now();
            const codigo = 'VIP' + String(nuevoId).slice(-4);
            const nuevoCliente = {
                nombre: nombre,
                whatsapp: wsp,
                codigo: codigo,
                fecha: new Date().toLocaleDateString(),
                descuentoUsado: false
            };

            db.ref('clientesVIP/v' + nuevoId).set(nuevoCliente)
                .then(() => {
                    // Notificar al POS del cajero
                    db.ref('notificaciones/descuentoPendiente').set({
                        nombre: nombre,
                        codigo: codigo,
                        timestamp: Date.now()
                    });
                    finalizarRegistro(codigo, wsp);
                });
        }
    });
}

function buscarYMostrar(tel) {
    db.ref('clientesVIP').orderByChild('whatsapp').equalTo(tel).once('value', snapshot => {
        if (snapshot.exists()) {
            const data = snapshot.val();
            const cliente = data[Object.keys(data)[0]];
            finalizarRegistro(cliente.codigo, tel);
        } else {
            cambiarPantalla('pantalla-form');
        }
    });
}

function finalizarRegistro(codigo, tel) {
    localStorage.setItem('vip_tel', tel);
    document.getElementById('codigo-display').innerText = codigo;
    cambiarPantalla('pantalla-exito');
}

// --- SEGURIDAD DE CARGA ---
// En lugar de usar onload en el script, usamos este detector profesional
window.addEventListener('load', function() {
    // Damos un segundo para que Firebase se asiente en el navegador
    setTimeout(function() {
        if (typeof firebase !== 'undefined') {
            iniciarApp();
        } else {
            document.getElementById('pantalla-loading').innerHTML = "❌ Error: Firebase no cargó.";
        }
    }, 1000);
});
</script>

</body>
</html>
