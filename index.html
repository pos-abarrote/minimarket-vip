<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Panel - MiniMKT</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1A3A5C; color: white; margin: 0; padding: 20px; }
        .pos-container { max-width: 900px; margin: 0 auto; }
        .header-pos { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #F7B731; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Notificación Alerta */
        #alerta-nueva { display: none; background: #F7B731; color: #1A3A5C; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Tabla de Clientes */
        .tabla-card { background: white; color: #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; color: #1A3A5C; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pendiente { background: #fff3e0; color: #e65100; }
        .usado { background: #e8f5ee; color: #2D9E5F; }
        
        .btn-cobrar { background: #2D9E5F; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cobrar:hover { background: #23834d; }
        .btn-cobrar:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="pos-container">
    <div class="header-pos">
        <h2>🖥️ PANEL DE CAJA (VIP)</h2>
        <div id="status-db">🟢 Conectado</div>
    </div>

    <div id="alerta-nueva">
        🔔 NUEVO REGISTRO: <span id="nombre-alerta">---</span> (Código: <span id="codigo-alerta">---</span>)
    </div>

    <div class="tabla-card">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>WhatsApp</th>
                    <th>Código</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// CONFIGURACIÓN (Misma que tu formulario)
const firebaseConfig = {
    apiKey: 'AIzaSyDyxfsQwQcpyHf7VgISfDGrrAKU3CizEUI',
    authDomain: 'minimarket-pos-b9920.firebaseapp.com',
    databaseURL: 'https://minimarket-pos-b9920-default-rtdb.firebaseio.com',
    projectId: 'minimarket-pos-b9920',
    storageBucket: 'minimarket-pos-b9920.appspot.com',
    messagingSenderId: '545908921698',
    appId: '1:545908921698:web:fd7e4650dbacf16f67883b'
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 1. ESCUCHAR NOTIFICACIONES (Alertas rápidas)
db.ref('notificaciones/descuentoPendiente').on('value', (snap) => {
    const data = snap.val();
    if(data) {
        document.getElementById('alerta-nueva').style.display = 'block';
        document.getElementById('nombre-alerta').innerText = data.nombre;
        document.getElementById('codigo-alerta').innerText = data.codigo;
        
        // Sonido de alerta opcional
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(() => {});
    }
});

// 2. CARGAR LISTADO DE CLIENTES
function cargarClientes() {
    db.ref('clientesVIP').on('value', (snap) => {
        const tbody = document.getElementById('tabla-body');
        tbody.innerHTML = '';
        const data = snap.val();

        if(data) {
            // Convertir objeto a array y ordenar por los más recientes
            const lista = Object.keys(data).map(key => ({...data[key], key: key}));
            lista.reverse().forEach(cliente => {
                const tr = document.createElement('tr');
                const estadoTxt = cliente.descuentoUsado ? 'Usado' : 'Pendiente';
                const estadoClass = cliente.descuentoUsado ? 'usado' : 'pendiente';
                
                tr.innerHTML = `
                    <td><strong>${cliente.nombre}</strong></td>
                    <td>${cliente.whatsapp}</td>
                    <td><code style="background:#eee;padding:3px 6px;border-radius:4px">${cliente.codigo}</code></td>
                    <td><span class="badge ${estadoClass}">${estadoTxt}</span></td>
                    <td>
                        <button class="btn-cobrar" 
                                onclick="aplicarDescuento('${cliente.key}')" 
                                ${cliente.descuentoUsado ? 'disabled' : ''}>
                            ${cliente.descuentoUsado ? '✅ Aplicado' : '🎟️ Usar 10%'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    });
}

// 3. MARCAR COMO USADO
function aplicarDescuento(key) {
    if(confirm("¿Confirmas que aplicarás el 10% a este cliente?")) {
        db.ref('clientesVIP/' + key).update({
            descuentoUsado: true,
            fechaUso: new Date().toLocaleString('es-CL'),
            esperandoDescuento: false
        }).then(() => {
            // Limpiar la alerta si es el mismo cliente
            document.getElementById('alerta-nueva').style.display = 'none';
        });
    }
}

cargarClientes();
</script>
</body>
</html>
