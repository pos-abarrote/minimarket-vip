<script>
var fbListo = false;
var db = null;

function fbSDKerror() {
  const loader = document.getElementById('pantalla-loading');
  if (loader) {
    loader.innerHTML = `
      <div style="text-align:center;padding:40px; font-family: sans-serif;">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <div style="font-size:16px;font-weight:700;color:#D62828">Error de Conexión</div>
        <p style="color:#666">No se pudo conectar con el servidor de la base de datos.</p>
        <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#1A3A5C;color:white;border:none;border-radius:8px;cursor:pointer">Reintentar</button>
      </div>`;
  }
}

function verificarCarga() {
  // Esperamos un momento extra para que el navegador procese los scripts cargados
  setTimeout(() => {
    if (typeof firebase !== "undefined") {
      inicializarSistema();
    } else {
      fbSDKerror();
    }
  }, 300);
}

function inicializarSistema() {
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyDyxfsQwQcpyHf7VgISfDGrrAKU3CizEUI",
      authDomain: "minimarket-pos-b9920.firebaseapp.com",
      databaseURL: "https://minimarket-pos-b9920-default-rtdb.firebaseio.com",
      projectId: "minimarket-pos-b9920",
      storageBucket: "minimarket-pos-b9920.appspot.com",
      messagingSenderId: "545908921698",
      appId: "1:545908921698:web:fd7e4650dbacf16f67883b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    
    db = firebase.database();
    fbListo = true;
    console.log("✅ Firebase activo");

    // Llama aquí a tu función de inicio principal
    if (typeof init === "function") {
      init();
    }
    
  } catch(e) {
    console.error("Error al iniciar:", e);
    fbSDKerror();
  }
}

// Fallback por si el 'onload' del script falla por red lenta
window.addEventListener('load', () => {
  if (!fbListo) {
    setTimeout(() => {
      if (typeof firebase === "undefined") fbSDKerror();
    }, 5000); // 5 segundos de espera máxima
  }
});
</script>
